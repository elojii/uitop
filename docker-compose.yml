version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:3000
      DATABASE_PATH: /data/db.sqlite
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://backend:3001
    ports:
      - '3000:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
